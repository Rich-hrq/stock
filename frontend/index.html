<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美股指数波动分析 - 海龟交易法则</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <header class="header">
        <h1>美股指数波动分析</h1>
        <span class="subtitle">基于《海龟交易法则》的技术指标与趋势跟踪</span>
        <a href="/prediction.html" class="nav-link">预测市场</a>
        <a href="/news.html" class="nav-link">新闻资讯</a>
        <a href="/portfolio.html" class="nav-link">持仓记录</a>
        <div class="market-status" id="marketStatus" title="加载中...">
            <span class="status-dot"></span>
            <span class="status-label">加载中...</span>
            <span class="status-time"></span>
        </div>
    </header>

    <!-- 控制面板 -->
    <section class="controls">
        <div class="index-tabs" id="indexTabs">
            <!-- JS 动态填充 -->
        </div>
        <div class="time-controls">
            <div class="time-presets" id="timePresets">
                <button data-days="1">1天</button>
                <button data-days="7">1周</button>
                <button data-days="30">1月</button>
                <button data-days="90">3月</button>
                <button data-days="180" class="active">6月</button>
                <button data-days="365">1年</button>
            </div>
            <div class="custom-date">
                <input type="date" id="startDate">
                <span>至</span>
                <input type="date" id="endDate">
                <button id="applyDate">确定</button>
            </div>
        </div>
    </section>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="chart-container">
            <div class="chart-toggles" id="chartToggles">
                <button data-group="price" class="toggle-btn always-on">走势线</button>
                <button data-group="ma" class="toggle-btn active">均线</button>
                <button data-group="candlestick" class="toggle-btn">K线+量</button>
                <button data-group="bollinger" class="toggle-btn">布林带</button>
                <button data-group="donchian" class="toggle-btn">唐奇安</button>
                <button data-group="positions" class="toggle-btn">持仓标记</button>
            </div>
            <div class="chart-legend-inline" id="chartLegendInline"></div>
            <span id="markerHint" style="font-size:11px;color:#4caf50;margin-left:12px;display:none;"></span>
            <div id="mainChart"></div>
        </div>
        <aside class="side-panel" id="sidePanel">
            <div class="panel-section stats" id="statsPanel">
                <h3>统计指标</h3>
                <div id="statsContent"><p class="placeholder">请选择指数和时间范围</p></div>
            </div>
            <div class="panel-section advice" id="advicePanel">
                <h3>趋势跟踪建议</h3>
                <div id="adviceContent"><p class="placeholder">等待数据加载...</p></div>
            </div>
            <div class="panel-section indicators" id="indicatorsPanel">
                <h3>海龟交易法则指标</h3>
                <div id="indicatorsContent"><p class="placeholder">—</p></div>
            </div>
        </aside>
    </main>

    <!-- K线形态分析弹出窗口 -->
    <div class="candlestick-overlay hidden" id="candlestickOverlay">
        <div class="candlestick-popup">
            <div class="candlestick-popup-header">
                <div>
                    <h2>K线形态分析</h2>
                    <span class="candlestick-popup-date" id="candlestickPopupDate"></span>
                </div>
                <button class="candlestick-popup-close" id="candlestickPopupClose" aria-label="关闭">&times;</button>
            </div>
            <div class="candlestick-popup-body" id="candlestickPopupBody">
                <!-- JS 动态填充 -->
            </div>
            <div class="candlestick-popup-footer">
                <button class="candlestick-popup-close-btn" id="candlestickPopupCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 浮动聊天按钮 -->
    <button class="chat-fab" id="chatFab" title="询问海龟交易法则">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
    </button>

    <!-- 聊天对话框 -->
    <div class="chat-dialog" id="chatDialog">
        <div class="chat-header">
            <h3>海龟交易法则 · 智能问答</h3>
            <p class="chat-hint">基于《海龟交易法则》原书内容回答，非通用知识库</p>
            <button class="chat-close" id="chatClose">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="msg-content">
                    你好！我是海龟交易法则学习助手。<br>
                    你可以问我关于书中任何内容，例如：<br>
                    · 海龟交易法则的入市策略有哪些？<br>
                    · 如何计算N值/ATR？<br>
                    · 海龟的头寸管理规则是什么？
                </div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="输入你的问题..." autocomplete="off">
            <button id="chatSend">发送</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/charts.js"></script>
    <script src="/js/indicators.js"></script>
    <script src="/js/candlestick.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
